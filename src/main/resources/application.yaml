spring:
  application:
    name: freshco-backend

  # ---------- DATABASE ----------
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # ---------- JPA ----------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ---------- EMAIL ----------
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ---------- JWT ----------
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-milliseconds: ${JWT_EXPIRATION}
  password-reset:
    token-expiration-minutes: 15
  login:
    max-attempts: 5
    lock-duration-minutes: 15
  otp:
    expiration-minutes: 10

server:
  port: ${SERVER_PORT:8080}

# ---------- SWAGGER ----------
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha

# ---------- LOGGING ----------
logging:
  file:
    name: logs/freshco.log
  level:
    root: WARN
    com.freshco: INFO
    com.freshco.security: DEBUG
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      clean-history-on-start: false